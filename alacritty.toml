
#sets shell to zsh
[terminal.shell]
program = "/usr/bin/zsh"

#makes the terminal transparent
[window]
opacity = 0.9

#changes font size
[font]
size = 18.0

[window.dimensions]
columns = 130
lines = 33

[window.padding]
x = 6
y = 6

#-------------THEME (Dracula)--------------
[colors.primary]

background = "#282a36"
foreground = "#f8f8f2"
bright_foreground = "#ffffff"

[colors.cursor]

text = "#282a36"
cursor = "#f8f8f2"

[colors.vi_mode_cursor]

text = "CellBackground"
cursor = "CellForeground"

[colors.selection]

text = "CellForeground"
background = "#44475a"

[colors.normal]

black = "#21222c"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"


